name: 'runnable'
run-name: 'Runnable'

# Disable permissions for all of the available permissions
permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'

jobs:
  code-analysis:
    name: 'Code Analysis'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version-file: flutter_tilt_example/pubspec.yaml
      - name: Prepare dependencies (flutter_tilt_example)
        run: |
          cd flutter_tilt_example
          flutter --version
          flutter pub get
      - name: Check Dart code formatting
        run: |
          cd flutter_tilt_book
          dart format . -o none --set-exit-if-changed
      - name: Analyze Dart code
        run: |
          flutter analyze . --no-fatal-infos
      - name: Prepare dependencies (flutter_tilt_book)
        run: |
          cd flutter_tilt_book
          node --version
          npm --version
          npm i
      - name: Check code formatting
        run: |
          cd flutter_tilt_book
          npm run lint
          npm run format:check

  test-build:
    needs: [code-analysis]
    strategy:
      matrix:
        include:
          - os: macos-latest
            build: iOS
          - os: macos-latest
            build: macOS
          - os: windows-latest
            build: Android
          - os: windows-latest
            build: Windows
          - os: ubuntu-latest
            build: Linux
          - os: windows-latest
            build: Web
    name: 'Test Build :: ${{ matrix.os }} :: ${{ matrix.build }}'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./flutter_tilt_example
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        if: matrix.build == 'Android'
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version-file: flutter_tilt_example/pubspec.yaml
      - name: Prepare dependencies
        run: |
          dart --version
          flutter --version
          flutter pub get
      - name: Build iOS
        if: matrix.build == 'iOS'
        run: flutter build ios --no-codesign
      - name: Build macOS
        if: matrix.build == 'macOS'
        run: flutter build macos --debug
      - name: Build Android
        if: matrix.build == 'Android'
        run: flutter build apk --debug
      - name: Build Windows
        if: matrix.build == 'Windows'
        run: flutter build windows --debug
      - name: Build Linux
        if: matrix.build == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --debug
      - name: Build Web
        if: matrix.build == 'Web'
        run: flutter build web --wasm --release
